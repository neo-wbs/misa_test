apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth_service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth_service
  template:
    metadata:
      labels:
        app: auth_service
    spec:
      containers:
      - name: auth_service
        image: auth_service:v1
        imagePullPolicy: Never     # lokales Image, nicht Docker Hub
        ports:
        - containerPort: 8001
        env:
        - name: PYTHONUNBUFFERED
          value: "1"
---
apiVersion: v1
kind: Service
metadata:
  name: auth_service               # DNS-Name im Cluster
spec:
  selector:
    app: auth_service
  ports:
  - port: 8001
    targetPort: 8001